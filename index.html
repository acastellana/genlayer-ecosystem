<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GenLayer Ecosystem</title>
    <meta
      name="description"
      content="Interactive ecosystem map for GenLayer and connected projects."
    />
    <link rel="icon" href="/genlayer-ecosystem/assets/logos/genlayer-mark.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script type="module" crossorigin src="/genlayer-ecosystem/assets/index-CxutTnsm.js"></script>
    <link rel="stylesheet" crossorigin href="/genlayer-ecosystem/assets/index-Dl3MKgkE.css">
  </head>
  <body>
    <div class="noise" aria-hidden="true"></div>

    <div id="ecosystem-stage" class="ecosystem-stage" aria-label="GenLayer ecosystem map">
      <div id="viewport" class="viewport">
        <svg id="connections" class="connections" aria-hidden="true"></svg>
        <div id="nodes" class="nodes"></div>
        <div class="center-glow" aria-hidden="true"></div>
      </div>

      <header class="masthead">
        <p class="eyebrow">Ecosystem Map</p>
        <h1>GenLayer Ecosystem</h1>
      </header>

      <div class="bottom-actions">
        <button id="focus-genlayer" class="ghost-button" type="button">Re-center</button>
        <button id="add-project-btn" class="add-project-button" type="button">+ Add your project</button>
      </div>
    </div>

    <!-- Submit project modal -->
    <div id="submit-modal" class="submit-modal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="submit-modal-title">
      <div class="submit-backdrop" id="submit-backdrop"></div>
      <div class="submit-drawer">
        <button class="panel-close" type="button" id="submit-close" aria-label="Close">
          <span></span><span></span>
        </button>
        <h2 id="submit-modal-title">Add your project</h2>
        <p class="submit-description">Submit your project URL. The GenLayer AI jury fetches the page and auto-generates the name, description, label, and connections. Costs <strong>1 GEN</strong>.</p>

        <div id="submit-form">
          <label for="submit-url" class="submit-label">Project URL</label>
          <input id="submit-url" class="submit-input" type="url" placeholder="https://yourproject.xyz" autocomplete="off" />
          <button id="submit-btn" class="submit-confirm-btn" type="button">Connect wallet &amp; submit</button>
        </div>

        <div id="submit-status" class="submit-status" aria-live="polite"></div>
      </div>
    </div>

    <aside id="detail-panel" class="detail-panel" aria-hidden="true">
      <div class="detail-backdrop" data-close-panel></div>
      <div class="detail-drawer" role="dialog" aria-modal="true" aria-labelledby="panel-title">
        <button class="panel-close" type="button" data-close-panel aria-label="Close panel">
          <span></span><span></span>
        </button>

        <div class="panel-header">
          <div class="panel-logo-wrap">
            <img id="panel-logo" class="panel-logo" alt="" />
          </div>
          <div>
            <p id="panel-type" class="panel-type"></p>
            <h2 id="panel-title"></h2>
            <p id="panel-tagline" class="panel-tagline"></p>
          </div>
        </div>

        <div class="panel-sections">
          <section>
            <h3>What it is</h3>
            <p id="panel-description" class="panel-copy"></p>
          </section>

          <section>
            <h3>Signals</h3>
            <div id="panel-tags" class="tag-grid"></div>
          </section>

          <section>
            <h3>Relevant links</h3>
            <div id="panel-links" class="link-list"></div>
          </section>

          <section>
            <h3>Relationships</h3>
            <div id="panel-relationships" class="relationship-list"></div>
          </section>
        </div>
      </div>
    </aside>

  </body>
</html>
